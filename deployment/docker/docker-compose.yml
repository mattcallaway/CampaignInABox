version: '3.8'

services:
  campaign-dashboard:
    build: 
      context: ../..
      dockerfile: deployment/docker/Dockerfile
    container_name: campaign_in_a_box_app
    ports:
      - "8501:8501"
    volumes:
      - ../../data:/app/data
      - ../../derived:/app/derived
      - ../../config:/app/config
      - ../../reports:/app/reports
      - ../../logs:/app/logs
    environment:
      - STREAMLIT_SERVER_PORT=8501
      - STREAMLIT_SERVER_ADDRESS=0.0.0.0
    restart: unless-stopped
