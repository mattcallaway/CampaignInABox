  # ─── SONOMA COUNTY — ELECTIONSTATS ─────────────────────────────────────

  - source_id: ca_sonoma_electionstats
    jurisdiction_type: county
    state: CA
    county: Sonoma
    source_kind: electionstats_database
    official_status: unofficial
    confidence_default: 0.80
    auto_ingest_allowed: true
    requires_confirmation: true
    user_approved: false
    base_url: "https://electionstats.org/county/sonoma"
    notes: >
      ElectionStats.org aggregates historical county-level election data.
      Useful for multi-year precinct-level trend analysis.
      Data may be slightly different from official certified results due to precinct splits.

  # ─── SONOMA COUNTY — CLARITY ENR ────────────────────────────────────────

  - source_id: ca_sonoma_clarity_enr
    jurisdiction_type: county
    state: CA
    county: Sonoma
    source_kind: clarity_enr
    official_status: preliminary
    confidence_default: 0.75
    auto_ingest_allowed: false
    requires_confirmation: true
    user_approved: false
    base_url: "https://results.enr.clarityelections.com/CA/Sonoma"
    notes: >
      Clarity Elections ENR shows preliminary results on election night.
      Precinct data is available early but may change through certification.
      Use for election-night monitoring only; prefer registrar certified for modeling.

  # ─── CALIFORNIA SOS — STATEWIDE ──────────────────────────────────────────

  - source_id: ca_sos_statewide_results
    jurisdiction_type: state
    state: CA
    source_kind: state_sos
    official_status: certified
    confidence_default: 0.92
    auto_ingest_allowed: true
    requires_confirmation: true
    user_approved: false
    base_url: "https://www.sos.ca.gov/elections"
    page_url: "https://www.sos.ca.gov/elections/prior-elections/statement-vote"
    file_patterns:
      - "*sov*.zip"
      - "*statement_of_vote*.xls*"
      - "*statewide_results*.zip"
    preferred_formats: [xlsx, xls, zip]
    precinct_id_format: mprec
    normalization_rule: mprec_standard
    notes: >
      California SOS posts precinct-level certified results as Statement of Vote.
      Statewide results include all counties and use MPREC precinct IDs.
      Zip archives contain per-county XLS files.

