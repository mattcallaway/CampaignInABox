    confidence_default: 0.95
    auto_ingest_allowed: true
    requires_confirmation: true
    user_approved: false
    page_type: election_page
    discovery_mode: pattern_scan
    base_url: "https://sonomacounty.gov"
    page_url: "https://sonomacounty.gov/administrative-support-and-fiscal-services/registrar-of-voters/elections/november-5-2024-general-election"
    file_patterns:
      - "*statement_of_votes_cast*.xlsx"
      - "*2024*general*.xlsx"
      - "*precinct*.xlsx"
    preferred_formats: [xlsx, xls]
    precinct_id_format: srprec
    normalization_rule: srprec_to_mprec
    notes: "November 5, 2024 General Election — Sonoma County certified results. URL follows sonomacounty.gov election naming convention."

