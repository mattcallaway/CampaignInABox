  ###########################################################################
  # ─── SONOMA COUNTY — ELECTIONSTATS DATABASE ─────────────────────────
  ###########################################################################

  # Official Sonoma County historical election results database.
  # Covers 2009–2024. Launched by the Registrar of Voters.
  # URL: electionstats.sonomacounty.ca.gov (ca.gov subdomain = gov tier)
  - source_id: sonoma_electionstats_database
    jurisdiction_type: county
    state: CA
    county: Sonoma
    source_kind: electionstats_database
    official_status: verified
    source_origin: seeded_official
    confidence_default: 0.92
    auto_ingest_allowed: true
    requires_confirmation: true
    user_approved: false
    page_type: discovery_page
    discovery_mode: direct
    base_url: "https://electionstats.sonomacounty.ca.gov"
    page_url: "https://electionstats.sonomacounty.ca.gov/"
    notes: >
      Sonoma County official historical election database (2009–2024).
      Launched by the Registrar of Voters for public access to election returns.
      domain: electionstats.sonomacounty.ca.gov (ca.gov subdomain, gov_tier).

  ###########################################################################
  # ─── SONOMA COUNTY — CLARITY ENR ────────────────────────────────────
  ###########################################################################

  - source_id: clarity_sonoma
    jurisdiction_type: county
    state: CA
    county: Sonoma
    source_kind: clarity_enr
    official_status: preliminary
    source_origin: seeded_official
    confidence_default: 0.70
    auto_ingest_allowed: false
    requires_confirmation: true
    user_approved: false
    page_type: discovery_page
    discovery_mode: pattern_scan
    base_url: "https://results.enr.clarityelections.com"
    page_url: "https://results.enr.clarityelections.com/CA/Sonoma"
    discovery_patterns:
      - "*General*"
      - "*Primary*"
      - "*Special*"
    notes: >
      Clarity Elections ENR for Sonoma County — shows preliminary results.
      Requires election-ID discovery (Clarity uses numeric IDs per election).
      Use for election-night monitoring only; prefer registrar certified for modeling.
      Ingestion must be assisted (manual_only or pattern_scan with ID lookup).

