# Contest Source Registry — Campaign In A Box
# Seeded with known high-confidence sources for Sonoma County and California.
# Add entries following the schema defined in source_registry_schema.yaml.
# ---

schema_version: "1.0"
last_updated: "2026-03-12"

sources:

  # ─── SONOMA COUNTY — REGISTRAR OF VOTERS ────────────────────────────────

  - source_id: ca_sonoma_registrar_election_results
    jurisdiction_type: county
    state: CA
    county: Sonoma
    source_kind: county_registrar
    official_status: certified
    confidence_default: 0.95
    auto_ingest_allowed: true
    requires_confirmation: true
    user_approved: false
    base_url: "https://socoe.us/elections"
    page_url: "https://socoe.us/elections/election-results"
    file_patterns:
      - "*SOV*.xls*"
      - "*statement_of_vote*.xls*"
      - "*results*.xlsx"
      - "*certified*.xlsx"
    preferred_formats: [xlsx, xls, csv]
    precinct_id_format: srprec
    normalization_rule: srprec_to_mprec
    notes: >
      Sonoma County Registrar of Voters posts Statement of Vote and precinct-level
      results after certification. URL structure varies by election year.
      Manual download typically required; file naming is inconsistent.

  - source_id: ca_sonoma_registrar_2024_general
