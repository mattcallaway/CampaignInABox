  # Primary SOS discovery page for statewide election results.
  - source_id: ca_sos_elections
    jurisdiction_type: state
    state: CA
    source_kind: state_sos
    official_status: certified
    source_origin: seeded_official
    confidence_default: 0.92
    auto_ingest_allowed: true
    requires_confirmation: true
    user_approved: false
    page_type: discovery_page
    discovery_mode: pattern_scan
    base_url: "https://www.sos.ca.gov"
    page_url: "https://www.sos.ca.gov/elections/prior-elections/statewide-election-results"
    discovery_patterns:
      - "*general-election*"
      - "*statement-vote*"
      - "*ballot-measure*"
      - "*statewide*"
    file_patterns:
      - "*sov*.zip"
      - "*statement_of_vote*.xls*"
      - "*statewide_results*.zip"
    preferred_formats: [xlsx, xls, zip]
    precinct_id_format: mprec
    normalization_rule: mprec_standard
    notes: >
      California SOS statewide election results discovery page.
      The system traverses election-year links found via discovery_patterns,
      then downloads Statement of Vote files. Results use MPREC precinct IDs.

