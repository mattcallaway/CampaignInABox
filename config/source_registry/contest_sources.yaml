# Contest Source Registry — Campaign In A Box
# Prompt 25A:   Initial seeding (16 entries)
# Prompt 25A.1: source_origin field added
# Prompt 25A.2: Canonical URL repair
#   - Invalid socoe.us entries removed
#   - electionstats.org entry replaced with electionstats.sonomacounty.ca.gov
#   - New discovery-page sources added: sonoma_registrar_elections, sonoma_electionstats_database
#   - Per-year entries updated to sonomacounty.gov domain
#   - page_type, discovery_mode, discovery_patterns fields added to all entries
#   - SOS URL fixed to correct statewide-election-results path
#   - Clarity entry updated with page_type and discovery_mode
#
# page_type values: discovery_page | election_page | file_download | api_endpoint
# discovery_mode values: direct | pattern_scan | manual_only | api
# ---

schema_version: "1.2"
last_updated: "2026-03-13"

sources:

  ###########################################################################
  # ─── SONOMA COUNTY — REGISTRAR OF VOTERS (sonomacounty.gov) ─────────
  ###########################################################################

  # PRIMARY DISCOVERY SOURCE for Sonoma County election results.
  # The system loads this page, finds election year links via discovery_patterns,
  # then follows those pages to find file downloads matching file_patterns.
  - source_id: sonoma_registrar_elections
    jurisdiction_type: county
    state: CA
    county: Sonoma
    source_kind: county_registrar
    official_status: verified
    source_origin: seeded_official
    confidence_default: 0.95
    auto_ingest_allowed: true
    requires_confirmation: true
    user_approved: false
    page_type: discovery_page
    discovery_mode: pattern_scan
    base_url: "https://sonomacounty.gov"
    page_url: "https://sonomacounty.gov/administrative-support-and-fiscal-services/registrar-of-voters/elections"
    discovery_patterns:
      - "*general-election*"
      - "*primary-election*"
      - "*special-election*"
      - "*election-results*"
      - "*election-returns*"
    file_patterns:
      - "*statement_of_votes_cast*.xlsx"
      - "*statement_of_votes_cast*.xls"
      - "*precinct*.xlsx"
      - "*contest*.xlsx"
      - "*results*.xlsx"
      - "*certified*.xlsx"
    preferred_formats: [xlsx, xls, csv]
    precinct_id_format: srprec
    normalization_rule: srprec_to_mprec
    notes: >
      Primary discovery page for Sonoma County election results.
      The system should load this page, follow election-specific links matching
      discovery_patterns, then search for file_patterns on those sub-pages.
      Results are certified by the Sonoma County Registrar of Voters.

  # ─── SONOMA — PER-YEAR ELECTION RESULT PAGES ─────────────────────────
