# Official Domain Allowlist — Campaign In A Box Source Registry
# ---
# Prompt 25A.1: 3-tier allowlist created
# Prompt 25A.2: sonomacounty.gov, electionstats.sonomacounty.ca.gov, socovotes.com added.
#               socoe.us REMOVED — confirmed not an official government domain.
#
# TIERS:
#   gov_tier:       True government domains (.gov / official registrar). Max confidence: 0.99
#   official_tier:  Official-adjacent domains (ENR vendors, open gov portals). Max: 0.90
#   academic_tier:  Trusted academic/aggregator sources. Max: 0.85
#   not_allowlisted: Any domain not listed. Max: 0.59 (or 0.95 if user_approved)
# ---

schema_version: "1.1"
last_updated: "2026-03-13"

gov_tier:
  # True government or official registrar domains. Max confidence: 0.99
  max_confidence: 0.99
  domains:
    # California SOS
    - sos.ca.gov
    - www.sos.ca.gov
    - elections.cdn.sos.ca.gov
    - vig.cdn.sos.ca.gov
    - vote.ca.gov
    # Sonoma County — official .gov domain
    - sonomacounty.gov
    - www.sonomacounty.gov
    # Sonoma County — primary county website (ca.gov subdomain)
    - sonomacounty.ca.gov
    - www.sonomacounty.ca.gov
    # Sonoma County — official Registrar domain (redirects to sonomacounty.gov)
    - socovotes.com
    - www.socovotes.com
    # Sonoma County — official election results database (ca.gov subdomain)
    - electionstats.sonomacounty.ca.gov
    # NOTE: socoe.us was previously listed here. Research confirmed it is NOT
    # the official Sonoma County registrar domain. Removed in Prompt 25A.2.

official_tier:
  # Official-adjacent: ENR vendors, county open data portals.
  # Not .gov but serve official government data under contract or citation.
  # Max confidence: 0.90
  max_confidence: 0.90
  domains:
    - results.enr.clarityelections.com
    # ^ Clarity Elections — used by hundreds of CA counties for ENR reporting
    - data.sonoma.opendata.arcgis.com
    # ^ Sonoma County official open data portal (ArcGIS hosted)

academic_tier:
  # Trusted academic/research aggregators.
  # Max confidence: 0.85 (per user policy: only true .gov gets highest confidence)
  max_confidence: 0.85
  domains:
    - statewidedatabase.org
    # ^ UC Berkeley Statewide Database — canonical MPREC geometry and crosswalks
    - electionstats.org
    # ^ ElectionStats.org — general CA election data aggregator (NOT Sonoma-specific)
    - nces.ed.gov
    # ^ National Center for Education Statistics — school district boundaries

notes: >
  Domain allowlist policy (updated Prompt 25A.2):
  - gov_tier: True .gov domains or official registrar domains. Max: 0.99
    Includes sonomacounty.gov, socovotes.com, electionstats.sonomacounty.ca.gov
  - official_tier: Official-adjacent (ENR vendors, open data portals). Max: 0.90
  - academic_tier: Trusted academic/aggregator sources. Max: 0.85
  - Not allowlisted: Any other domain. Max: 0.59 (or 0.95 if user_approved)

  socoe.us removed: confirmed not an official government domain (was a tech company domain).
