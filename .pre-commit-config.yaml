repos:
  - repo: local
    hooks:
      - id: github-safety-check
        name: Campaign In A Box — GitHub Safety Check
        entry: python engine/data_intake/github_safety.py
        language: system
        pass_filenames: false
        always_run: true
        description: >
          Blocks commits containing raw voter files, PII columns,
          or un-aggregated campaign runtime data.
          See engine/data_intake/github_safety.py for rules.
